  - "作为助手"
  - "人工智能"
  - "语言模型"
  - "我无法"
  - "我不能"
  - "请注意"
  - "需要说明"
  - "以下是"
  - "综上所述"
  - "希望能帮助你"
  - "如果还有问题"
  - "随时问我"
  - "很高兴帮助"
  - "根据你的问题"
  - "从专业角度"
  - "建议你"
  - "这是因为"
  - "首先.*其次.*最后"
  - "我不是AI"
  - "我是真人"
  - "我真的不是"

